name: Build ExamBrowser Windows

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 PyQtWebEngine pyinstaller

      - name: Build Executable with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name="exambro_windows" --clean exambro_windows.py

      - name: Copy Readme/Installation Guide
        run: |
          copy BACA_SEBELUM_INSTAL.txt dist\

      - name: Upload Windows Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xambro-Windows
          path: |
            dist/exambro_windows.exe
            dist/BACA_SEBELUM_INSTAL.txt
