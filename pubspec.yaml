name: exambrowser
description: Official ExamBrowser for CBT System.
version: 1.3.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_inappwebview: ^6.0.0
  url_launcher: ^6.2.0
  wakelock_plus: ^1.1.4
  http: ^1.2.0
  shared_preferences: ^2.2.3
  mobile_scanner: ^5.1.0
  kiosk_mode: ^0.3.0
  audioplayers: ^5.2.1
  audio_session: ^0.1.16
  screen_protector: ^1.5.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/alert.mp3
    - assets/logo.png
